<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>영수증매니저 - 모바일 촬영</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
header{background:#1a2235;padding:16px;text-align:center;border-bottom:2px solid #f59e0b}
header h1{font-size:16px;color:#f59e0b}
header p{font-size:11px;color:#94a3b8;margin-top:4px}
.thumbs{flex:1;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;overflow-y:auto}
.thumb{position:relative;width:calc(33.33% - 6px);aspect-ratio:3/4;border-radius:8px;overflow:hidden;border:2px solid #334155}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-del{position:absolute;top:4px;right:4px;background:rgba(239,68,68,.9);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.thumb-idx{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.7);color:#f59e0b;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:#475569;font-size:13px;text-align:center;line-height:2}
.bottom{padding:12px;background:#1a2235;border-top:1px solid #334155}
.btn-camera{width:100%;padding:16px;font-size:16px;font-weight:700;background:#f59e0b;color:#0f172a;border:none;border-radius:12px;cursor:pointer;margin-bottom:8px}
.btn-camera:active{background:#d97706}
.btn-send{width:100%;padding:14px;font-size:15px;font-weight:700;background:#22c55e;color:#fff;border:none;border-radius:12px;cursor:pointer;display:none}
.btn-send:active{background:#16a34a}
.btn-send:disabled{background:#334155;color:#64748b}
.status{text-align:center;font-size:12px;color:#94a3b8;margin-top:8px;min-height:18px}
</style>
</head>
<body>
<header>
  <h1>영수증매니저</h1>
  <p>스마트폰으로 영수증을 촬영하여 PC로 전송합니다</p>
</header>

<div class="thumbs" id="thumbList">
  <div class="empty" id="emptyMsg">📷 아래 버튼을 눌러<br>영수증을 촬영하세요</div>
</div>

<div class="bottom">
  <button class="btn-camera" onclick="document.getElementById('camInput').click()">📷 영수증 촬영하기</button>
  <button class="btn-send" id="sendBtn" onclick="sendAll()">📤 PC로 전송하기 (<span id="cnt">0</span>장)</button>
  <div class="status" id="status"></div>
</div>

<input type="file" id="camInput" accept="image/*" capture="environment" onchange="onCapture(this)" style="display:none">

<script>
const photos = [];

function onCapture(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const img = new Image();
  img.onload = () => {
    const MAX = 1200;
    let w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * (MAX / w)); w = MAX; }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = c.toDataURL('image/jpeg', 0.85);
    photos.push(dataUrl);
    render();
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
  input.value = '';
}

function render() {
  const list = document.getElementById('thumbList');
  const empty = document.getElementById('emptyMsg');
  const sendBtn = document.getElementById('sendBtn');
  const cnt = document.getElementById('cnt');

  if (photos.length === 0) {
    list.innerHTML = '<div class="empty" id="emptyMsg">📷 아래 버튼을 눌러<br>영수증을 촬영하세요</div>';
    sendBtn.style.display = 'none';
    return;
  }

  list.innerHTML = photos.map((p, i) =>
    `<div class="thumb">
      <img src="${p}">
      <button class="thumb-del" onclick="remove(${i})">✕</button>
      <span class="thumb-idx">${i + 1}</span>
    </div>`
  ).join('');

  cnt.textContent = photos.length;
  sendBtn.style.display = 'block';
}

function remove(idx) {
  photos.splice(idx, 1);
  render();
}

async function sendAll() {
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  const total = photos.length;

  for (let i = 0; i < total; i++) {
    status.textContent = `전송 중... (${i + 1}/${total})`;
    try {
      await fetch('/upload', { method: 'POST', body: photos[i] });
    } catch (e) {
      status.textContent = `❌ 전송 실패 (${i + 1}번째). 네트워크를 확인하세요.`;
      btn.disabled = false;
      return;
    }
  }

  photos.length = 0;
  render();
  status.textContent = `✅ ${total}장 전송 완료!`;
  btn.disabled = false;
  setTimeout(() => { status.textContent = ''; }, 3000);
}
</script>
</body>
</html>
